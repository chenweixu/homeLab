---
- name: 下载 runc 二进制包 (内网 URL)
  get_url:
    url: "https://files.chenwx.top/soft/runc.amd64-v1.3.0"
    dest: /usr/local/bin/runc
    owner: root
    group: root
    mode: '0755'
    timeout: 30

- name: 下载 containerd 二进制包 (内网 URL)
  get_url:
    url: "https://files.chenwx.top/soft/containerd-2.1.3-linux-amd64.tar.gz"
    dest: /tmp/containerd.tar.gz
    timeout: 30

- name: 解压 containerd 到系统目录
  unarchive:
    src: /tmp/containerd.tar.gz
    dest: /usr/local
    remote_src: yes  # 表示源文件在目标机器上，不需要从控制端上传

- name: 创建 containerd 配置目录
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: 上传 containerd 配置文件 (config.toml)
  copy:
    src: config.toml
    dest: /etc/containerd/config.toml
    owner: root
    group: root
    mode: '0644'
  register: containerd_config

- name: 上传 systemd 单元文件
  copy:
    src: containerd.service
    dest: /etc/systemd/system/containerd.service
    owner: root
    group: root
    mode: '0644'

- name: 重新加载 systemd 并启动 containerd, 设置 enable
  systemd:
    name: containerd
    daemon_reload: yes
    state: restarted
    enabled: yes
  when: containerd_config.changed


- name: 下载 crictl 二进制包 (内网 URL)
  get_url:
    url: "https://files.chenwx.top/soft/crictl-v1.33.0-linux-amd64.tar.gz"
    dest: /tmp/crictl.tar.gz
    timeout: 30

- name: 解压 crictl 到系统目录
  unarchive:
    src: /tmp/crictl.tar.gz
    dest: /usr/local/bin
    remote_src: yes


- name: 上传 /etc/crictl.yaml
  copy:
    src: "crictl.yaml"
    dest: /etc/crictl.yaml
    owner: root
    group: root
    mode: '0644'
    backup: no


- name: 清理临时文件
  file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /tmp/containerd.tar.gz
    - /tmp/crictl.tar.gz


