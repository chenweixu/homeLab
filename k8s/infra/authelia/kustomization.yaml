apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authelia

configMapGenerator:
  - name: users-data
    namespace: authelia
    files:
      - config/users_database.yml
    options:
      disableNameSuffixHash: true

resources:
  - ns.yaml
  - http-route.yaml
  - auth-middleware.yaml
  - secret-crypto.yaml

helmGlobals:
  chartHome: /tmp/charts

helmCharts:
  - name: authelia    # chart 包的名字
    repo: https://charts.authelia.com
    releaseName: authelia
    namespace: authelia
    version: 0.11.5
    valuesFile: values.yaml
