apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web4
spec:
  scaleTargetRef:
    kind: Deployment
    name: web4
    apiVersion: apps/v1
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
