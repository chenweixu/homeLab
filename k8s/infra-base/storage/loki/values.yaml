
global:
  imageRegistry: harbor.chenwx.top/docker.io
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials

# SingleBinary /SimpleScalable / Distributed
deploymentMode: SingleBinary


loki:
  image:
    repository: grafana/loki
    tag: 3.6.7

  limits_config:
    otlp_config:
      resource_attributes:
        attributes_config:
          - action: index_label
            attributes:
              - host.name
              - host.type
              - cloud.availability_zone
              - service.name

    # 限流, 每秒10M
    ingestion_rate_mb: 10
    # 限流, 突发限制
    ingestion_burst_size_mb: 6

  commonConfig:
    replication_factor: 1

  auth_enabled: false

  storage:
    bucketNames:
      chunks: loki
      ruler: loki
      admin: loki

    type: s3
    s3:
      endpoint: https://minio.chenwx.top
      region: us-east-1
      secretAccessKey: ${S3_SECRET_ACCESS_KEY}
      accessKeyId: ${S3_ACCESS_KEY_ID}
      signatureVersion: "v4"
      s3ForcePathStyle: true
      insecure: false

  schemaConfig:
    configs:
      - from: "2025-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  persistence:
    # accessModes:
    #   - ReadWriteMany
    storageClass: nfs-home-sc
  extraArgs:
    - "-config.expand-env=true"

  # 因为覆盖原有的 secret, 所以不再单独定义
  # extraEnv:
  #   - name: LOKI_S3_ACCESS_KEY_ID
  #     valueFrom:
  #       secretKeyRef:
  #         name: loki-secret
  #         key: AWS_ACCESS_KEY_ID
  #   - name: LOKI_S3_SECRET_ACCESS_KEY
  #     valueFrom:
  #       secretKeyRef:
  #         name: loki-secret
  #         key: AWS_SECRET_ACCESS_KEY

test:
  enabled: false

lokiCanary:
  enabled: false

memcached:
  enabled: false

memcachedExporter:
  enabled: false

resultsCache:
  enabled: false

chunksCache:
  enabled: false
