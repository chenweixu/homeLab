apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nfs-client-provisioner
  name: nfs-client-provisioner
spec:
  template:
    spec:
      containers:
        - name: nfs-client-provisioner
          image: harbor.chenwx.top/registry.k8s.io/sig-storage/nfs-subdir-external-provisioner:v4.0.2@sha256:f741e403b3ca161e784163de3ebde9190905fdbf7dfaa463620ab8f16c0f6423
          env:
            - name: NFS_SERVER
              value: 192.168.5.9
            - name: NFS_PATH
              value: /data/nfs-csi

      volumes:
        - name: nfs-client-root
          nfs:
            server: 192.168.5.9
            path: /data/nfs-csi
