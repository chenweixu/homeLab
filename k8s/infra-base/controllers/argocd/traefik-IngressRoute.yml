---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argo-route
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.chenwx.top`)
      kind: Rule
      services:
        - name: argocd-server
          namespace: argocd
          port: 80
