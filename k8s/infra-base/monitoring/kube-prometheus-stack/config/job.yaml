- job_name: "traefik"
  scrape_interval: 15s
  static_configs:
    - targets: ["192.168.5.9:8080"]

  relabel_configs:
    - source_labels: [__address__]
      regex: '([0-9.]+):[0-9]+'
      target_label: "node_ip"
      replacement: "${1}"
