
- job_name: 'pve'
  static_configs:
    - targets: ["192.168.5.9"]
      labels: {zone: 'home', name: 'pve-home'}
    - targets: ["192.168.5.10"]
      labels: {zone: 'home', name: 'pve-ser6'}
  metrics_path: /pve
  params:
    module: [default]
    cluster: ['1']
    node: ['1']
  relabel_configs:
    - source_labels: [__address__]
      regex: '([0-9.]+):[0-9]+'
      target_label: "node_ip"
      replacement: "${1}"
      action: replace

    - source_labels: [__address__]
      target_label: __param_target
    - source_labels: [__param_target]
      target_label: instance
    - target_label: __address__
      replacement: pve-exporter.monitoring.svc.cluster.local:80

#===================================================================
- job_name: "server"
  scrape_interval: 15s
  static_configs:
    - targets: ["192.168.5.5:9100"]
      labels: {zone: 'home', name: 'h5'}
    - targets: ["192.168.5.9:9100"]
      labels: {zone: 'home', name: 'pve-1'}
    - targets: ["192.168.5.10:9100"]
      labels: {zone: 'home', name: 'pve-2'}
    - targets: ["192.168.5.25:9100"]
      labels: {zone: 'home', name: 'h25'}

  relabel_configs:
    - source_labels: [__address__]
      regex: '([0-9.]+):[0-9]+'
      target_label: "node_ip"
      replacement: "${1}"
      action: replace


