- job_name: postgres
  metrics_path: /probe
  static_configs:
    - targets: ["192.168.5.9:5432"]
      labels: {zone: 'home', name: 'postgres', auth: "auth1"}
  relabel_configs:
    - source_labels: [__address__]
      regex: '([0-9.]+):[0-9]+'
      target_label: "node_ip"
      replacement: "${1}"
      action: replace

    - source_labels: [__address__]
      target_label: __param_target
    - source_labels: [__param_target]
      target_label: instance
    - source_labels: [auth]
      target_label: __param_auth_module
    - target_label: __address__
      replacement: postgres-exporter.monitoring.svc.cluster.local:80

