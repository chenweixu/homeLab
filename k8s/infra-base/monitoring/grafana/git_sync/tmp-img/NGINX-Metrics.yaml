apiVersion: dashboard.grafana.app/v1
kind: Dashboard
metadata:
  labels: {}
  name: NGINX-Metrics
  namespace: default
spec:
  annotations:
    list:
    - builtIn: 1
      datasource:
        type: grafana
        uid: "-- Grafana --"
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      name: Annotations & Alerts
      type: dashboard
  editable: true
  fiscalYearStartMonth: 0
  graphTooltip: 0
  links: []
  liveNow: false
  panels:
  - datasource:
      type: prometheus
      name: ${datasource}
    description: total accepted client connections
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: 0
          - color: red
            value: 80
      overrides: []
    gridPos:
      h: 3
      w: 5
      x: 0
      "y": 0
    id: 1
    options:
      colorMode: value
      graphMode: area
      justifyMode: auto
      orientation: auto
      percentChangeColorMode: standard
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ""
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    pluginVersion: 13.1.0-24866141508
    targets:
    - datasource:
        type: prometheus
        name: ${datasource}
      disableTextWrap: false
      editorMode: builder
      expr: nginx_connections_accepted
      fullMetaSearch: false
      includeNullMetadata: true
      legendFormat: __auto
      range: true
      refId: A
      useBackend: false
    title: Accepted connections
    type: stat
  - datasource:
      type: prometheus
      name: ${datasource}
    description: 每分钟新增连接数
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: 0
          - color: red
            value: 80
      overrides: []
    gridPos:
      h: 3
      w: 5
      x: 5
      "y": 0
    id: 2
    options:
      colorMode: value
      graphMode: area
      justifyMode: auto
      orientation: auto
      percentChangeColorMode: standard
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ""
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    pluginVersion: 13.1.0-24866141508
    targets:
    - datasource:
        type: prometheus
        name: ${datasource}
      disableTextWrap: false
      editorMode: builder
      expr: rate(nginx_http_requests_total[1m])
      fullMetaSearch: false
      includeNullMetadata: true
      legendFormat: __auto
      range: true
      refId: A
      useBackend: false
    title: conneNumber/min
    type: stat
  - datasource:
      type: prometheus
      name: ${datasource}
    description: The total number of handled connections
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: 0
          - color: red
            value: 80
      overrides: []
    gridPos:
      h: 3
      w: 5
      x: 10
      "y": 0
    id: 3
    options:
      colorMode: value
      graphMode: area
      justifyMode: auto
      orientation: auto
      percentChangeColorMode: standard
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ""
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    pluginVersion: 13.1.0-24866141508
    targets:
    - datasource:
        type: prometheus
        name: ${datasource}
      disableTextWrap: false
      editorMode: builder
      expr: nginx_connections_handled
      fullMetaSearch: false
      includeNullMetadata: true
      legendFormat: "{{__name__}}"
      range: true
      refId: A
      useBackend: false
    title: Connections handled
    type: stat
  - datasource:
      type: prometheus
      name: ${datasource}
    description: The total number of client requests
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: 0
      overrides: []
    gridPos:
      h: 3
      w: 5
      x: 15
      "y": 0
    id: 4
    options:
      colorMode: value
      graphMode: area
      justifyMode: auto
      orientation: auto
      percentChangeColorMode: standard
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ""
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    pluginVersion: 13.1.0-24866141508
    targets:
    - datasource:
        type: prometheus
        name: ${datasource}
      disableTextWrap: false
      editorMode: builder
      expr: nginx_http_requests_total
      fullMetaSearch: false
      includeNullMetadata: true
      legendFormat: "{{__name__}}"
      range: true
      refId: A
      useBackend: false
    title: Total number of client requests
    type: stat
  - datasource:
      type: prometheus
      name: ${datasource}
    description: The current number of nginx connections by state
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          axisBorderShow: false
          axisCenteredZero: false
          axisColorMode: text
          axisLabel: ""
          axisPlacement: auto
          barAlignment: 0
          barWidthFactor: 0.6
          drawStyle: line
          fillOpacity: 0
          gradientMode: none
          hideFrom:
            legend: false
            tooltip: false
            viz: false
          insertNulls: false
          lineInterpolation: linear
          lineWidth: 1
          pointSize: 5
          scaleDistribution:
            type: linear
          showPoints: auto
          showValues: false
          spanNulls: false
          stacking:
            group: A
            mode: none
          thresholdsStyle:
            mode: "off"
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: 0
          - color: red
            value: 80
      overrides: []
    gridPos:
      h: 10
      w: 20
      x: 0
      "y": 4
    id: 5
    options:
      annotations:
        clustering: -1
        multiLane: false
      legend:
        calcs: []
        displayMode: list
        placement: bottom
        showLegend: true
      tooltip:
        hideZeros: false
        mode: single
        sort: none
    pluginVersion: 13.1.0-24866141508
    targets:
    - datasource:
        type: prometheus
        name: ${datasource}
      disableTextWrap: false
      editorMode: builder
      expr: nginx_connections_active
      fullMetaSearch: false
      includeNullMetadata: true
      legendFormat: "{{state}}"
      range: true
      refId: A
      useBackend: false
    title: Number of connections by state
    type: timeseries
  preload: false
  refresh: ""
  schemaVersion: 42
  tags: []
  templating:
    list:
    - allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: 0
      includeAll: false
      label: Datasource
      multi: false
      name: datasource
      options: []
      query: prometheus
      refresh: 1
      regex: ""
      skipUrlSync: false
      type: datasource
  time:
    from: now-15m
    to: now
  timepicker:
    refresh_intervals:
    - 5s
    - 10s
    - 30s
    - 1m
    - 5m
    - 15m
    - 30m
    - 1h
    - 2h
    - 1d
  timezone: browser
  title: "[Image-Provider] NGINX Metrics"
  weekStart: ""
