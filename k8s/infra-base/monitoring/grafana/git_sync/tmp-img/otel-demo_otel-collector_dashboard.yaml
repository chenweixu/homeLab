apiVersion: dashboard.grafana.app/v1
kind: Dashboard
metadata:
  name: otel-demo_otel-collector_dashboard
  namespace: default
spec:
  annotations:
    list:
    - builtIn: 1
      datasource:
        type: grafana
        uid: grafana
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      name: Annotations & Alerts
      target:
        limit: 100
        matchAny: false
        tags: []
        type: dashboard
      type: dashboard
  description: Provides information about the status of the OpenTelemetry Collector
  editable: true
  fiscalYearStartMonth: 0
  graphTooltip: 1
  links: []
  liveNow: true
  panels:
  - collapsed: false
    gridPos:
      h: 1
      w: 24
      x: 0
      "y": 0
    id: 94
    title: Overview
    type: row
  - datasource:
      type: prometheus
      uid: ${prometheus_datasource}
    description: OTel Collectors. Derived from the `otelcol.process.uptime` metric.
    fieldConfig:
      defaults:
        custom:
          align: auto
          cellOptions:
            type: auto
          footer:
            reducers: []
          inspect: false
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: 0
          - color: red
            value: 80
      overrides:
      - matcher:
          id: byName
          options: Uptime
        properties:
        - id: unit
          value: dtdurations
        - id: custom.width
          value: 84
      - matcher:
          id: byName
          options: Namespace
        properties:
        - id: custom.width
          value: 110
      - matcher:
          id: byName
          options: Version
        properties:
        - id: custom.width
          value: 85
    gridPos:
      h: 4
      w: 17
      x: 0
      "y": 1
    id: 57
    options:
      cellHeight: sm
      showHeader: true
      sortBy:
      - desc: true
        displayName: Service Name
    pluginVersion: 13.1.0-24866141508
    targets:
    - datasource:
        type: prometheus
        uid: ${prometheus_datasource}
      editorMode: code
      expr: otelcol_process_uptime_seconds_total{deployment_environment_name=~"$deployment_environment_name", k8s_cluster_name=~"$k8s_cluster_name", k8s_node_name=~"$k8s_node_name", host_name=~"$host_name", service_instance_id=~"$service_instance_id", service_name=~"$service_name"}
      format: table
      instant: true
      legendFormat: "{{service_name}} {{service_instance_id}}"
      queryType: instant
      range: false
      refId: A
    transformations:
    - id: organize
      options:
        excludeByName:
          Time: true
          Value: false
          __name__: true
          instance: true
          job: true
        includeByName: {}
        indexByName:
          Time: 2
          Value: 12
          __name__: 3
          host_name: 4
          instance: 5
          job: 6
          k8s_cluster_name: 7
          k8s_namespace_name: 8
          k8s_node_name: 9
          k8s_pod_name: 10
          service_instance_id: 11
          service_name: 0
          service_version: 1
        orderByMode: manual
        renameByName:
          Value: Uptime
          host_name: Host
          k8s_cluster_name: K8s cluster
          k8s_namespace_name: Namespace
          k8s_node_name: Node
          k8s_pod_name: Pod
          service_instance_id: Service Instance Id
          service_name: Service Name
          service_version: Version
    type: table
  - gridPos:
      h: 6
      w: 6
      x: 17
      "y": 1
    id: 56
    options:
      alertInstanceLabelFilter: deployment_environment_name=~"$deployment_environment_name", k8s_cluster_name=~"$k8s_cluster_name", k8s_node_name=~"$k8s_node_name", host_name=~"$host_name", service_instance_id=~"$service_instance_id", service_name=~"$service_name"
      alertName: OpenTelemetryCollector
      dashboardAlerts: false
      groupBy: []
      groupMode: default
      maxItems: 17
      showInactiveAlerts: true
      sortOrder: 1
      statColorMode: none
      statThresholds:
        mode: absolute
        steps:
        - color: green
          value: 0
        - color: red
          value: 80
      statValueMappings: []
      stateFilter:
        error: true
        firing: true
        noData: true
        normal: false
        pending: true
        recovering: true
      viewMode: list
    pluginVersion: 13.1.0-24866141508
    title: Alerts
    type: alertlist
  - gridPos:
      h: 3
      w: 2
      x: 0
      "y": 5
    id: 63
    options:
      code:
        language: plaintext
        showLineNumbers: false
        showMiniMap: false
      content: Receivers
      mode: markdown
    pluginVersion: 13.1.0-24866141508
    type: text
  - datasource:
      type: prometheus
      uid: ${prometheus_datasource}
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        decimals: 0
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: 0
          - color: red
            value: 80
        unit: ops
      overrides:
      - matcher:
          id: byName
          options: Span Rate
        properties:
        - id: color
          value:
            fixedColor: blue
            mode: fixed
      - matcher:
          id: byName
          options: Logs
        properties:
        - id: color
          value:
            fixedColor: green
            mode: fixed
      - matcher:
          id: byName
          options: Metrics
        properties:
        - id: color
          value:
            fixedColor: purple
            mode: fixed
    gridPos:
      h: 3
      w: 3
      x: 2
      "y": 5
    id: 64
    options:
      colorMode: value
      graphMode: area
      justifyMode: auto
      orientation: auto
      percentChangeColorMode: standard
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ""
        values: false
      showPercentChange: false
      textMode: auto
      wideLayout: true
    pluginVersion: 13.1.0-24866141508
    targets:
    - datasource:
        type: prometheus
        uid: ${prometheus_datasource}
      editorMode: code
      expr: |-
        sum(rate(otelcol_receiver_accepted_spans_total{deployment_environment_name=~"$deployment_environment_name",k8s_cluster_name=~"$k8s_cluster_name",k8s_node_name=~"$k8s_node_name",host_name=~"$host_name",service_instance_id=~"$service_instance_id",service_name=~"$service_name"}[$__rate_interval]))
