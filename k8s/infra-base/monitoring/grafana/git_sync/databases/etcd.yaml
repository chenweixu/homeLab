apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: etcd
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: "Off"
  description: etcd sample Grafana dashboard with Prometheus
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(etcd_server_has_leader{job=~".*etcd.*", job="$cluster"})
                    legendFormat: "{{cluster}} - {{namespace}}\n"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 1
        links: []
        title: Up
        vizConfig:
          group: stat
          kind: VizConfig
          spec:
            fieldConfig:
              defaults: {}
              overrides: []
            options:
              colorMode: none
              graphMode: none
              reduceOptions:
                calcs:
                - lastNotNull
          version: v10.0.0
    panel-10:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(etcd_network_peer_sent_bytes_total{job=~".*etcd.*", job="$cluster"}[$__rate_interval])) by (instance)
                    legendFormat: "{{instance}} peer traffic out"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 10
        links: []
        title: Peer traffic out
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
                unit: Bps
              overrides: []
            options: {}
          version: v10.0.0
    panel-11:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: changes(etcd_server_leader_changes_seen_total{job=~".*etcd.*", job="$cluster"}[1d])
                    legendFormat: "{{instance}} total leader elections per day"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 11
        links: []
        title: Raft proposals
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
              overrides: []
            options: {}
          version: v10.0.0
    panel-12:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: changes(etcd_server_leader_changes_seen_total{job=~".*etcd.*", job="$cluster"}[1d])
                    legendFormat: "{{instance}} total leader elections per day"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 12
        links: []
        title: Total leader elections per day
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
              overrides: []
            options: {}
          version: v10.0.0
    panel-13:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: histogram_quantile(0.99, sum by (instance, le) (rate(etcd_network_peer_round_trip_time_seconds_bucket{job=~".*etcd.*", job="$cluster"}[$__rate_interval])))
                    legendFormat: "{{instance}} peer round trip time"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 13
        links: []
        title: Peer round trip time
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
                unit: s
              overrides: []
            options: {}
          version: v10.0.0
    panel-2:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(grpc_server_started_total{job=~".*etcd.*", job="$cluster",grpc_type="unary"}[$__rate_interval]))
                    legendFormat: RPC rate
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(grpc_server_handled_total{job=~".*etcd.*", job="$cluster",grpc_type="unary",grpc_code=~"Unknown|FailedPrecondition|ResourceExhausted|Internal|Unavailable|DataLoss|DeadlineExceeded"}[$__rate_interval]))
                    legendFormat: RPC failed rate
                  version: v0
                refId: B
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 2
        links: []
        title: RPC rate
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
                unit: ops
              overrides: []
            options: {}
          version: v10.0.0
    panel-3:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: "sum(grpc_server_started_total{job=~\".*etcd.*\",job=\"$cluster\",grpc_service=\"etcdserverpb.Watch\",grpc_type=\"bidi_stream\"}) - sum(grpc_server_handled_total{job=\"$cluster\",grpc_service=\"etcdserverpb.Watch\",grpc_type=\"bidi_stream\"})"
                    legendFormat: Watch streams
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: "sum(grpc_server_started_total{job=~\".*etcd.*\",job=\"$cluster\",grpc_service=\"etcdserverpb.Lease\",grpc_type=\"bidi_stream\"}) - sum(grpc_server_handled_total{job=\"$cluster\",grpc_service=\"etcdserverpb.Lease\",grpc_type=\"bidi_stream\"})"
                    legendFormat: Lease streams
                  version: v0
                refId: B
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 3
        links: []
        title: Active streams
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
              overrides: []
            options: {}
          version: v10.0.0
    panel-4:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: etcd_mvcc_db_total_size_in_bytes{job=~".*etcd.*", job="$cluster"}
                    legendFormat: "{{instance}} DB size"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 4
        links: []
        title: DB size
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
                unit: bytes
              overrides: []
            options: {}
          version: v10.0.0
    panel-5:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: histogram_quantile(0.99, sum(rate(etcd_disk_wal_fsync_duration_seconds_bucket{job=~".*etcd.*", job="$cluster"}[$__rate_interval])) by (instance, le))
                    legendFormat: "{{instance}} WAL fsync"
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: histogram_quantile(0.99, sum(rate(etcd_disk_backend_commit_duration_seconds_bucket{job=~".*etcd.*", job="$cluster"}[$__rate_interval])) by (instance, le))
                    legendFormat: "{{instance}} DB fsync"
                  version: v0
                refId: B
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 5
        links: []
        title: Disk sync duration
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
                unit: s
              overrides: []
            options: {}
          version: v10.0.0
    panel-6:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: process_resident_memory_bytes{job=~".*etcd.*", job="$cluster"}
                    legendFormat: "{{instance}} resident memory"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 6
        links: []
        title: Memory
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
                unit: bytes
              overrides: []
            options: {}
          version: v10.0.0
    panel-7:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: rate(etcd_network_client_grpc_received_bytes_total{job=~".*etcd.*", job="$cluster"}[$__rate_interval])
                    legendFormat: "{{instance}} client traffic in"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 7
        links: []
        title: Client traffic in
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
                unit: Bps
              overrides: []
            options: {}
          version: v10.0.0
    panel-8:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: rate(etcd_network_client_grpc_sent_bytes_total{job=~".*etcd.*", job="$cluster"}[$__rate_interval])
                    legendFormat: "{{instance}} client traffic out"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 8
        links: []
        title: Client traffic out
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
                unit: Bps
              overrides: []
            options: {}
          version: v10.0.0
    panel-9:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: $datasource
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(etcd_network_peer_received_bytes_total{job=~".*etcd.*", job="$cluster"}[$__rate_interval])) by (instance)
                    legendFormat: "{{instance}} peer traffic in"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 9
        links: []
        title: Peer traffic in
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  lineWidth: 2
                  showPoints: never
                unit: Bps
              overrides: []
            options: {}
          version: v10.0.0
  layout:
    kind: GridLayout
    spec:
      items:
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-1
          height: 7
          width: 6
          x: 0
          "y": 0
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-2
          height: 7
          width: 10
          x: 6
          "y": 0
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-3
          height: 7
          width: 8
          x: 16
          "y": 0
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-4
          height: 7
          width: 8
          x: 0
          "y": 25
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-5
          height: 7
          width: 8
          x: 8
          "y": 25
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-6
          height: 7
          width: 8
          x: 16
          "y": 25
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
