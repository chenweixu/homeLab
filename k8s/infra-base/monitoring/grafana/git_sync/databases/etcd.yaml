      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-11
          height: 7
          width: 8
          x: 0
          "y": 75
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-12
