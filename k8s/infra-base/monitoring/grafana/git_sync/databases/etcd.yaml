  links: []
  liveNow: false
  preload: false
  tags:
  - etcd-mixin
  timeSettings:
    autoRefresh: 10s
    autoRefreshIntervals:
    - 5s
    - 10s
    - 30s
    - 1m
    - 5m
    - 15m
    - 30m
    - 1h
    - 2h
    - 1d
    fiscalYearStartMonth: 0
    from: now-15m
    hideTimepicker: false
    timezone: utc
    to: now
  title: etcd
  variables:
  - kind: DatasourceVariable
    spec:
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: dontHide
      includeAll: false
      label: Data Source
      multi: false
      name: datasource
      options: []
      pluginId: prometheus
      refresh: never
      regex: ""
      skipUrlSync: false
  - kind: QueryVariable
    spec:
      allValue: .*
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: hideVariable
      includeAll: false
      label: cluster
      multi: false
      name: cluster
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(etcd_server_has_leader{job=~".*etcd.*"}, job)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: disabled
