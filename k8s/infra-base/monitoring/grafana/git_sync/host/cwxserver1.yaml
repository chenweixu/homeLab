apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
    name: cwxserver1
spec:
    annotations:
        - kind: AnnotationQuery
          spec:
            builtIn: true
            enable: true
            hide: true
            iconColor: rgba(0, 211, 255, 1)
            name: Annotations & Alerts
            query:
                datasource:
                    name: -- Grafana --
                group: grafana
                kind: DataQuery
                spec: {}
                version: v0
    cursorSync: "Off"
    description: ""
    editable: true
    elements:
        panel-1:
            kind: Panel
            spec:
                data:
                    kind: QueryGroup
                    spec:
                        queries:
                            - kind: PanelQuery
                              spec:
                                hidden: false
                                query:
                                    datasource:
                                        name: Prometheus
                                    group: prometheus
                                    kind: DataQuery
                                    spec:
                                        editorMode: code
                                        expr: sum(up{job="server"})
                                        legendFormat: __auto
                                        range: true
                                    version: v0
                                refId: A
                        queryOptions: {}
                        transformations: []
                description: 服务器在线数量
                id: 1
                links: []
                title: 服务器在线数量
                vizConfig:
                    group: stat
                    kind: VizConfig
                    spec:
                        fieldConfig:
                            defaults:
                                color:
                                    mode: thresholds
                                thresholds:
                                    mode: absolute
                                    steps:
                                        - color: red
                                          value: 0
                                        - color: green
                                          value: 10
                            overrides: []
                        options:
                            colorMode: value
                            graphMode: area
                            justifyMode: auto
                            orientation: auto
                            percentChangeColorMode: standard
                            reduceOptions:
                                calcs:
                                    - lastNotNull
                                fields: ""
                                values: false
                            showPercentChange: false
                            textMode: auto
                            wideLayout: true
                    version: 13.1.0-24866141508
    layout:
        kind: GridLayout
        spec:
            items:
                - kind: GridLayoutItem
                  spec:
                    element:
                        kind: ElementReference
                        name: panel-1
                    height: 3
                    width: 5
                    x: 0
                    "y": 0
    links: []
    liveNow: false
    preferences:
        layout:
            kind: GridLayout
            spec:
                items: []
    preload: false
    tags: []
    timeSettings:
        autoRefresh: ""
        autoRefreshIntervals:
            - 5s
            - 10s
            - 30s
            - 1m
            - 5m
            - 15m
            - 30m
            - 1h
            - 2h
            - 1d
        fiscalYearStartMonth: 0
        from: now-6h
        hideTimepicker: false
        timezone: browser
        to: now
    title: cwx-server1
    variables: []
