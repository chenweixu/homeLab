apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: Kubernetes-Networking-Workload
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: "Off"
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      sort_desc(sum((8 * rate(container_network_receive_bytes_total{job="kubelet", metrics_path="/metrics/cadvisor", cluster="$cluster",namespace=~"$namespace"}[$__rate_interval]))
                      * on (cluster, namespace, pod)
                      group_left(workload,workload_type) namespace_workload_pod:kube_pod_owner:relabel{cluster="$cluster",namespace=~"$namespace", workload=~"$workload", workload_type=~"$type"}) by (pod))
                    legendFormat: __auto
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 1
        links: []
        title: Current Rate of Bits Received
        vizConfig:
          group: bargauge
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                color:
                  fixedColor: green
                  mode: fixed
                unit: bps
              overrides: []
            options:
              displayMode: basic
              showUnfilled: false
          version: v11.4.0
