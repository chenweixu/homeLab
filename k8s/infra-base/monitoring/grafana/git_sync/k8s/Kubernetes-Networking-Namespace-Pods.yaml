apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: Kubernetes-Networking-Namespace-Pods
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: "Off"
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      sum (
                          (8 * rate(container_network_receive_bytes_total{cluster="$cluster",namespace=~"$namespace"}[$__rate_interval]))
                        * on (cluster,namespace,pod) group_left ()
                          topk by (cluster,namespace,pod) (
                            1,
                            max by (cluster,namespace,pod) (kube_pod_info{host_network="false"})
                          )
                      )
                    legendFormat: __auto
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 1
        links: []
        title: Current Rate of Bits Received
        vizConfig:
          group: gauge
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                displayName: $namespace
                max: 10000000000
                min: 0
                thresholds:
                  mode: ""
                  steps:
                  - color: dark-green
                    value: null
                  - color: dark-yellow
                    value: 5000000000
                  - color: dark-red
                    value: 7000000000
                unit: bps
              overrides: []
            options: {}
          version: v11.4.0
    panel-2:
