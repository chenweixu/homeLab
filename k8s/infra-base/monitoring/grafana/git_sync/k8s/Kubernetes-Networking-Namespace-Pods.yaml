                  mode: outer
            - group: organize
              kind: Transformation
              spec:
                options:
                  excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                    Time 6: true
                  indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    Time 6: 5
                    "Value #A": 7
                    "Value #B": 8
                    "Value #C": 9
                    "Value #D": 10
                    "Value #E": 11
                    "Value #F": 12
                    pod: 6
                  renameByName:
