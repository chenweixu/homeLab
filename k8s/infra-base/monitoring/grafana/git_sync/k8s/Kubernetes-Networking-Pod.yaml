apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: Kubernetes-Networking-Pod
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: "Off"
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum((8 * rate(container_network_receive_bytes_total{cluster="$cluster",namespace=~"$namespace", pod=~"$pod"}[$__rate_interval])))
                    legendFormat: __auto
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 1
        links: []
        title: Current Rate of Bits Received
        vizConfig:
          group: gauge
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                displayName: $pod
                max: 10000000000
                min: 0
                thresholds:
                  mode: ""
                  steps:
                  - color: dark-green
                    value: null
                  - color: dark-yellow
                    value: 5000000000
                  - color: dark-red
                    value: 7000000000
                unit: bps
              overrides: []
            options: {}
          version: v11.4.0
    panel-2:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum((8 * rate(container_network_transmit_bytes_total{cluster="$cluster",namespace=~"$namespace", pod=~"$pod"}[$__rate_interval])))
                    legendFormat: __auto
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 2
        links: []
        title: Current Rate of Bits Transmitted
        vizConfig:
          group: gauge
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                displayName: $pod
                max: 10000000000
                min: 0
                thresholds:
                  mode: ""
                  steps:
                  - color: dark-green
                    value: null
                  - color: dark-yellow
                    value: 5000000000
                  - color: dark-red
                    value: 7000000000
                unit: bps
              overrides: []
            options: {}
          version: v11.4.0
    panel-3:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum((8 * rate(container_network_receive_bytes_total{cluster="$cluster",namespace=~"$namespace", pod=~"$pod"}[$__rate_interval]))) by (pod)
                    legendFormat: __auto
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 3
        links: []
        title: Receive Bandwidth
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  showPoints: never
                unit: bps
              overrides: []
            options:
              legend:
                asTable: true
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-4:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum((8 * rate(container_network_transmit_bytes_total{cluster="$cluster",namespace=~"$namespace", pod=~"$pod"}[$__rate_interval]))) by (pod)
                    legendFormat: __auto
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 4
        links: []
        title: Transmit Bandwidth
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  showPoints: never
                unit: bps
              overrides: []
            options:
              legend:
                asTable: true
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-5:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(container_network_receive_packets_total{cluster="$cluster",namespace=~"$namespace", pod=~"$pod"}[$__rate_interval])) by (pod)
                    legendFormat: __auto
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 5
        links: []
        title: Rate of Received Packets
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  showPoints: never
                unit: pps
              overrides: []
            options:
              legend:
                asTable: true
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-6:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(container_network_transmit_packets_total{cluster="$cluster",namespace=~"$namespace", pod=~"$pod"}[$__rate_interval])) by (pod)
                    legendFormat: __auto
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 6
        links: []
        title: Rate of Transmitted Packets
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  showPoints: never
                unit: pps
              overrides: []
            options:
              legend:
                asTable: true
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-7:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(container_network_receive_packets_dropped_total{cluster="$cluster",namespace=~"$namespace", pod=~"$pod"}[$__rate_interval])) by (pod)
                    legendFormat: __auto
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 7
        links: []
        title: Rate of Received Packets Dropped
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
