            options:
              legend:
                asTable: true
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
  layout:
    kind: GridLayout
    spec:
      items:
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-1
          height: 9
          width: 12
          x: 0
          "y": 0
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-2
          height: 9
          width: 12
          x: 12
          "y": 0
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-3
          height: 9
          width: 12
          x: 0
          "y": 9
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-4
          height: 9
          width: 12
          x: 12
          "y": 9
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-5
          height: 9
          width: 12
          x: 0
          "y": 18
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-6
          height: 9
          width: 12
          x: 12
          "y": 18
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-7
          height: 9
          width: 12
          x: 0
          "y": 27
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-8
          height: 9
          width: 12
          x: 12
          "y": 27
  links:
  - asDropdown: true
    icon: ""
    includeVars: true
    keepTime: true
    tags:
    - kubernetes-mixin
    targetBlank: false
    title: Kubernetes
    tooltip: ""
    type: dashboards
  liveNow: false
  preload: false
  tags:
  - kubernetes-mixin
  timeSettings:
    autoRefresh: 10s
    autoRefreshIntervals:
    - 5s
    - 10s
    - 30s
    - 1m
    - 5m
    - 15m
    - 30m
    - 1h
    - 2h
    - 1d
    fiscalYearStartMonth: 0
    from: now-1h
    hideTimepicker: false
    timezone: utc
    to: now
  title: Kubernetes / Networking / Pod
  variables:
  - kind: DatasourceVariable
    spec:
      allowCustomValue: true
      current:
        text: default
        value: default
      hide: dontHide
      includeAll: false
      label: Data source
      multi: false
      name: datasource
      options: []
      pluginId: prometheus
      refresh: never
      regex: ""
      skipUrlSync: false
  - kind: QueryVariable
    spec:
      allValue: .*
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: hideVariable
      includeAll: false
      label: cluster
      multi: false
      name: cluster
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(up{job="kubelet", metrics_path="/metrics/cadvisor"}, cluster)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: alphabeticalAsc
  - kind: QueryVariable
    spec:
      allValue: .+
      allowCustomValue: true
      current:
        text: kube-system
        value: kube-system
      hide: dontHide
      includeAll: true
      label: namespace
      multi: false
      name: namespace
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(container_network_receive_packets_total{cluster="$cluster"}, namespace)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: alphabeticalAsc
  - kind: QueryVariable
    spec:
      allowCustomValue: true
      current:
        text: kube-system
        value: kube-system
      hide: dontHide
      includeAll: false
      label: pod
      multi: false
      name: pod
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(container_network_receive_packets_total{cluster="$cluster",namespace=~"$namespace"}, pod)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: alphabeticalAsc
