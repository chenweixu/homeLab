apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: k8s-Compute-Resources-Multi-Cluster
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: "Off"
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(cluster:node_cpu:ratio_rate5m) / count(cluster:node_cpu:ratio_rate5m)
                    instant: true
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 1
        links: []
        title: CPU Utilisation
        vizConfig:
          group: stat
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                unit: none
              overrides: []
            options:
              colorMode: none
          version: v11.4.0
    panel-10:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(max by (cluster, namespace, pod, container)(container_memory_rss{job="kubelet", metrics_path="/metrics/cadvisor", container!=""})) by (cluster)
                    format: table
                    instant: true
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(kube_pod_container_resource_requests{job="kube-state-metrics", resource="memory"}) by (cluster)
                    format: table
                    instant: true
                  version: v0
                refId: B
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(max by (cluster, namespace, pod, container)(container_memory_rss{job="kubelet", metrics_path="/metrics/cadvisor", container!=""})) by (cluster) / sum(kube_pod_container_resource_requests{job="kube-state-metrics", resource="memory"}) by (cluster)
                    format: table
                    instant: true
                  version: v0
                refId: C
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(kube_pod_container_resource_limits{job="kube-state-metrics", resource="memory"}) by (cluster)
                    format: table
                    instant: true
                  version: v0
                refId: D
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(max by (cluster, namespace, pod, container)(container_memory_rss{job="kubelet", metrics_path="/metrics/cadvisor", container!=""})) by (cluster) / sum(kube_pod_container_resource_limits{job="kube-state-metrics", resource="memory"}) by (cluster)
                    format: table
                    instant: true
                  version: v0
                refId: E
            queryOptions: {}
            transformations:
            - group: joinByField
              kind: Transformation
              spec:
                options:
                  byField: cluster
                  mode: outer
            - group: organize
              kind: Transformation
              spec:
                options:
                  excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                  indexByName:
                    Time 1: 0
                    Time 2: 1
                    Time 3: 2
                    Time 4: 3
                    Time 5: 4
                    "Value #A": 6
                    "Value #B": 7
                    "Value #C": 8
                    "Value #D": 9
                    "Value #E": 10
                    cluster: 5
                  renameByName:
                    "Value #A": Memory Usage
                    "Value #B": Memory Requests
                    "Value #C": Memory Requests %
                    "Value #D": Memory Limits
                    "Value #E": Memory Limits %
                    cluster: Cluster
        description: ""
        id: 10
        links: []
        title: Memory Requests by Cluster
        vizConfig:
          group: table
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                unit: bytes
              overrides:
              - matcher:
                  id: byRegexp
                  options: /%/
                properties:
                - id: unit
                  value: percentunit
              - matcher:
                  id: byName
                  options: Cluster
                properties:
                - id: links
