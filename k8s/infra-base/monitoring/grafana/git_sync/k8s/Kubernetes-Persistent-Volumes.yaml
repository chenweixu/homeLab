apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: Kubernetes-Persistent-Volumes
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: "Off"
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      (
                        sum without(instance, node) (topk(1, (kubelet_volume_stats_capacity_bytes{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})))
                        -
                        sum without(instance, node) (topk(1, (kubelet_volume_stats_available_bytes{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})))
                      )
                    legendFormat: Used Space
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      sum without(instance, node) (topk(1, (kubelet_volume_stats_available_bytes{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})))
                    legendFormat: Free Space
                  version: v0
                refId: B
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 1
        links: []
        title: Volume Space Usage
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: true
                unit: bytes
              overrides: []
            options:
              legend:
                asTable: true
                calcs:
                - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-2:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      max without(instance,node) (
                      (
                        topk(1, kubelet_volume_stats_capacity_bytes{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})
                        -
                        topk(1, kubelet_volume_stats_available_bytes{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})
                      )
                      /
                      topk(1, kubelet_volume_stats_capacity_bytes{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})
                      * 100)
                    instant: true
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 2
        links: []
        title: Volume Space Usage
        vizConfig:
          group: gauge
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                color:
                  mode: thresholds
                max: 100
                min: 0
                thresholds:
                  mode: absolute
                  steps:
                  - color: green
                    value: 0
                  - color: orange
                    value: 80
                  - color: red
                    value: 90
                unit: percent
              overrides: []
            options: {}
          version: v11.4.0
    panel-3:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum without(instance, node) (topk(1, (kubelet_volume_stats_inodes_used{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})))
                    legendFormat: Used inodes
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      (
                        sum without(instance, node) (topk(1, (kubelet_volume_stats_inodes{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})))
                        -
                        sum without(instance, node) (topk(1, (kubelet_volume_stats_inodes_used{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})))
                      )
                    legendFormat: Free inodes
                  version: v0
                refId: B
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 3
        links: []
        title: Volume inodes Usage
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: true
                unit: none
              overrides: []
            options:
              legend:
                asTable: true
                calcs:
                - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-4:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      max without(instance,node) (
                      topk(1, kubelet_volume_stats_inodes_used{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})
                      /
                      topk(1, kubelet_volume_stats_inodes{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace", persistentvolumeclaim="$volume"})
                      * 100)
                    instant: true
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 4
        links: []
        title: Volume inodes Usage
        vizConfig:
          group: gauge
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                color:
                  mode: thresholds
                max: 100
                min: 0
                thresholds:
                  mode: absolute
                  steps:
                  - color: green
                    value: 0
                  - color: orange
                    value: 80
                  - color: red
                    value: 90
                unit: percent
              overrides: []
            options: {}
          version: v11.4.0
  layout:
    kind: GridLayout
    spec:
      items:
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-1
          height: 7
          width: 18
          x: 0
          "y": 0
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-2
          height: 7
          width: 6
          x: 18
          "y": 0
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-3
          height: 7
          width: 18
          x: 0
          "y": 7
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-4
          height: 7
          width: 6
          x: 18
          "y": 7
  links:
  - asDropdown: true
    icon: ""
    includeVars: true
    keepTime: true
    tags:
    - kubernetes-mixin
    targetBlank: false
    title: Kubernetes
    tooltip: ""
    type: dashboards
  liveNow: false
  preload: false
  tags:
  - kubernetes-mixin
  timeSettings:
    autoRefresh: 10s
    autoRefreshIntervals:
    - 5s
    - 10s
    - 30s
    - 1m
    - 5m
    - 15m
    - 30m
    - 1h
    - 2h
    - 1d
    fiscalYearStartMonth: 0
    from: now-1h
    hideTimepicker: false
    timezone: utc
    to: now
  title: Kubernetes / Persistent Volumes
  variables:
  - kind: DatasourceVariable
    spec:
      allowCustomValue: true
      current:
        text: default
        value: default
      hide: dontHide
      includeAll: false
      label: Data source
      multi: false
      name: datasource
      options: []
      pluginId: prometheus
      refresh: never
      regex: ""
      skipUrlSync: false
  - kind: QueryVariable
    spec:
      allValue: .*
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: hideVariable
      includeAll: false
      label: cluster
      multi: false
      name: cluster
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(kubelet_volume_stats_capacity_bytes{job="kubelet", metrics_path="/metrics"}, cluster)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: alphabeticalAsc
  - kind: QueryVariable
    spec:
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: dontHide
      includeAll: false
      label: Namespace
      multi: false
      name: namespace
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(kubelet_volume_stats_capacity_bytes{cluster="$cluster", job="kubelet", metrics_path="/metrics"}, namespace)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: alphabeticalAsc
  - kind: QueryVariable
    spec:
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: dontHide
      includeAll: false
      label: PersistentVolumeClaim
      multi: false
      name: volume
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(kubelet_volume_stats_capacity_bytes{cluster="$cluster", job="kubelet", metrics_path="/metrics", namespace="$namespace"}, persistentvolumeclaim)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: alphabeticalAsc
