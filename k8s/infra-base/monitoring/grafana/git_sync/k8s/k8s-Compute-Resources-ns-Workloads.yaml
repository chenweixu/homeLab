apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: k8s-Compute-Resources-ns-Workloads
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: "Off"
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      sum(
                        max by (cluster, namespace, pod, container)(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_rate5m{cluster="$cluster", namespace="$namespace"})
                      * on(cluster, namespace, pod)
                        group_left(workload, workload_type) namespace_workload_pod:kube_pod_owner:relabel{cluster="$cluster", namespace="$namespace", workload_type=~"$type"}
                      ) by (workload, workload_type)
                    legendFormat: "{{workload}} - {{workload_type}}"
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: scalar(max(kube_resourcequota{cluster="$cluster", namespace="$namespace", type="hard",resource=~"requests.cpu|cpu"}))
                    legendFormat: "quota - requests"
                  version: v0
                refId: B
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: scalar(max(kube_resourcequota{cluster="$cluster", namespace="$namespace", type="hard",resource=~"limits.cpu"}))
                    legendFormat: "quota - limits"
                  version: v0
                refId: C
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 1
        links: []
        title: CPU Usage
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: true
              overrides:
              - matcher:
                  id: byFrameRefID
                  options: B
                properties:
                - id: custom.lineStyle
                  value:
                    fill: dash
                - id: custom.lineWidth
                  value: 2
                - id: color
                  value:
                    fixedColor: red
                    mode: fixed
              - matcher:
                  id: byFrameRefID
                  options: C
                properties:
                - id: custom.lineStyle
                  value:
                    fill: dash
                - id: custom.lineWidth
                  value: 2
                - id: color
                  value:
                    fixedColor: orange
                    mode: fixed
            options:
              legend:
                asTable: true
                calcs:
                - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
