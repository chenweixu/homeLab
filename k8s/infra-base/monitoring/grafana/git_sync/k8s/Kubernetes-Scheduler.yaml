apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: Kubernetes-Scheduler
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: "Off"
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(up{cluster="$cluster", job="kube-scheduler"})
                    instant: true
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 1
        links: []
        title: Up
        vizConfig:
          group: stat
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                unit: none
              overrides: []
            options:
              colorMode: none
          version: v11.4.0
    panel-2:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(scheduler_scheduling_attempt_duration_seconds_count{cluster="$cluster", job="kube-scheduler", instance=~"$instance"}[$__rate_interval])) by (cluster, instance)
                    legendFormat: "{{cluster}} {{instance}} e2e"
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(scheduler_pod_scheduling_sli_duration_seconds_count{cluster="$cluster", job="kube-scheduler", instance=~"$instance"}[$__rate_interval])) by (cluster, instance)
                    legendFormat: "{{cluster}} {{instance}} binding"
                  version: v0
                refId: B
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(scheduler_scheduling_algorithm_duration_seconds_count{cluster="$cluster", job="kube-scheduler", instance=~"$instance"}[$__rate_interval])) by (cluster, instance)
                    legendFormat: "{{cluster}} {{instance}} scheduling algorithm"
                  version: v0
                refId: C
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(scheduler_volume_scheduling_duration_seconds_count{cluster="$cluster", job="kube-scheduler", instance=~"$instance"}[$__rate_interval])) by (cluster, instance)
                    legendFormat: "{{cluster}} {{instance}} volume"
                  version: v0
                refId: D
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 2
        links: []
        title: Scheduling Rate
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: true
                unit: ops
              overrides: []
            options:
              legend:
                asTable: true
                calcs:
                - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-3:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: histogram_quantile(0.99, sum(rate(scheduler_scheduling_attempt_duration_seconds_bucket{cluster="$cluster", job="kube-scheduler",instance=~"$instance"}[$__rate_interval])) by (cluster, instance, le))
                    legendFormat: "{{cluster}} {{instance}} e2e"
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: histogram_quantile(0.99, sum(rate(scheduler_pod_scheduling_sli_duration_seconds_bucket{cluster="$cluster", job="kube-scheduler",instance=~"$instance"}[$__rate_interval])) by (cluster, instance, le))
                    legendFormat: "{{cluster}} {{instance}} binding"
                  version: v0
                refId: B
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: histogram_quantile(0.99, sum(rate(scheduler_scheduling_algorithm_duration_seconds_bucket{cluster="$cluster", job="kube-scheduler",instance=~"$instance"}[$__rate_interval])) by (cluster, instance, le))
                    legendFormat: "{{cluster}} {{instance}} scheduling algorithm"
                  version: v0
                refId: C
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: histogram_quantile(0.99, sum(rate(scheduler_volume_scheduling_duration_seconds_bucket{cluster="$cluster", job="kube-scheduler",instance=~"$instance"}[$__rate_interval])) by (cluster, instance, le))
                    legendFormat: "{{cluster}} {{instance}} volume"
                  version: v0
                refId: D
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 3
        links: []
        title: Scheduling latency 99th Quantile
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: true
                unit: s
              overrides: []
            options:
              legend:
                asTable: true
                calcs:
                - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-4:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(rest_client_requests_total{cluster="$cluster", job="kube-scheduler", instance=~"$instance",code=~"2.."}[$__rate_interval]))
                    legendFormat: 2xx
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(rest_client_requests_total{cluster="$cluster", job="kube-scheduler", instance=~"$instance",code=~"3.."}[$__rate_interval]))
                    legendFormat: 3xx
                  version: v0
                refId: B
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(rest_client_requests_total{cluster="$cluster", job="kube-scheduler", instance=~"$instance",code=~"4.."}[$__rate_interval]))
                    legendFormat: 4xx
                  version: v0
                refId: C
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(rate(rest_client_requests_total{cluster="$cluster", job="kube-scheduler", instance=~"$instance",code=~"5.."}[$__rate_interval]))
                    legendFormat: 5xx
                  version: v0
                refId: D
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 4
        links: []
        title: Kube API Request Rate
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: true
                unit: ops
              overrides: []
            options:
              legend:
                asTable: true
                calcs:
                - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-5:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: histogram_quantile(0.99, sum(rate(rest_client_request_duration_seconds_bucket{cluster="$cluster", job="kube-scheduler", instance=~"$instance", verb="POST"}[$__rate_interval])) by (verb, le))
                    legendFormat: "{{verb}}"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 5
        links: []
        title: Post Request Latency 99th Quantile
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: true
                unit: ops
              overrides: []
            options:
              legend:
                asTable: true
                calcs:
                - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-6:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: histogram_quantile(0.99, sum(rate(rest_client_request_duration_seconds_bucket{cluster="$cluster", job="kube-scheduler", instance=~"$instance", verb="GET"}[$__rate_interval])) by (verb, le))
                    legendFormat: "{{verb}}"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 6
        links: []
        title: Get Request Latency 99th Quantile
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: true
                unit: s
              overrides: []
            options:
              legend:
                asTable: true
                calcs:
                - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-7:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: process_resident_memory_bytes{cluster="$cluster", job="kube-scheduler", instance=~"$instance"}
                    legendFormat: "{{instance}}"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 7
        links: []
        title: Memory
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: true
                unit: bytes
              overrides: []
            options:
              legend:
                asTable: true
                calcs:
                - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
    panel-8:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: rate(process_cpu_seconds_total{cluster="$cluster", job="kube-scheduler", instance=~"$instance"}[$__rate_interval])
                    legendFormat: "{{instance}}"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 8
        links: []
        title: CPU usage
        vizConfig:
