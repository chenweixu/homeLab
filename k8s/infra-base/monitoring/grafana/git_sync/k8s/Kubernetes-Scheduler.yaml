              tooltip:
                mode: single
          version: v11.4.0
  layout:
    kind: GridLayout
    spec:
      items:
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-1
          height: 7
          width: 4
          x: 0
          "y": 0
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-2
          height: 7
          width: 10
          x: 4
          "y": 0
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-3
          height: 7
          width: 10
          x: 14
          "y": 0
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-4
          height: 7
          width: 8
          x: 0
          "y": 7
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-5
          height: 7
          width: 16
          x: 8
          "y": 7
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-6
          height: 7
          width: 24
          x: 0
          "y": 14
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-7
          height: 7
          width: 8
          x: 0
          "y": 21
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-8
          height: 7
          width: 8
          x: 8
          "y": 21
      - kind: GridLayoutItem
        spec:
          element:
            kind: ElementReference
            name: panel-9
          height: 7
          width: 8
          x: 16
          "y": 21
  links:
  - asDropdown: true
    icon: ""
    includeVars: true
    keepTime: true
    tags:
    - kubernetes-mixin
    targetBlank: false
    title: Kubernetes
    tooltip: ""
    type: dashboards
  liveNow: false
  preload: false
  tags:
  - kubernetes-mixin
  timeSettings:
    autoRefresh: 10s
    autoRefreshIntervals:
    - 5s
    - 10s
    - 30s
    - 1m
    - 5m
    - 15m
    - 30m
    - 1h
    - 2h
    - 1d
    fiscalYearStartMonth: 0
    from: now-1h
    hideTimepicker: false
    timezone: utc
    to: now
  title: Kubernetes / Scheduler
  variables:
  - kind: DatasourceVariable
    spec:
      allowCustomValue: true
      current:
        text: default
        value: default
      hide: dontHide
      includeAll: false
      label: Data source
      multi: false
      name: datasource
      options: []
      pluginId: prometheus
      refresh: never
      regex: ""
      skipUrlSync: false
  - kind: QueryVariable
    spec:
      allValue: .*
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: hideVariable
      includeAll: false
      label: cluster
      multi: false
      name: cluster
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(up{job="kube-scheduler"}, cluster)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: alphabeticalAsc
  - kind: QueryVariable
    spec:
      allValue: .+
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: dontHide
      includeAll: true
      label: instance
      multi: false
      name: instance
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(up{job="kube-scheduler", cluster="$cluster"}, instance)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: disabled
