apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: Node-Exporter-Nodes
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: Crosshair
  editable: true
  elements:
    panel-11:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: rate(node_network_receive_bytes_total{job="node-exporter", instance="$instance", cluster=~"$cluster", device!="lo"}[$__rate_interval]) * 8
                    intervalFactor: 1
                    legendFormat: "{{device}}"
                  version: v0
                refId: A
            queryOptions: {}
            transformations: []
        description: Network received (bits/s)
        id: 11
        links: []
        title: Network Received
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  showPoints: never
                min: 0
                unit: bps
              overrides: []
            options:
              tooltip:
                mode: multi
          version: v11.4.0
    panel-12:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: rate(node_network_transmit_bytes_total{job="node-exporter", instance="$instance", cluster=~"$cluster", device!="lo"}[$__rate_interval]) * 8
                    intervalFactor: 1
                    legendFormat: "{{device}}"
                  version: v0
                refId: A
            queryOptions: {}
            transformations: []
        description: Network transmitted (bits/s)
        id: 12
        links: []
        title: Network Transmitted
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                min: 0
                unit: bps
              overrides: []
            options:
              tooltip:
                mode: multi
          version: v11.4.0
    panel-2:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: "(\n  (1 - sum without (mode) (rate(node_cpu_seconds_total{job=\"node-exporter\", mode=~\"idle|iowait|steal\", instance=\"$instance\", cluster=~\"$cluster\"}[$__rate_interval])))\n/ ignoring(cpu) group_left\n  count without (cpu, mode) (node_cpu_seconds_total{job=\"node-exporter\", mode=\"idle\", instance=\"$instance\", cluster=~\"$cluster\"})\n)\n"
                    intervalFactor: 5
                    legendFormat: "{{cpu}}"
                  version: v0
                refId: A
            queryOptions: {}
            transformations: []
        description: ""
        id: 2
        links: []
        title: CPU Usage
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  stacking:
                    mode: normal
                max: 1
                min: 0
                unit: percentunit
              overrides: []
            options:
              tooltip:
                mode: multi
          version: v11.4.0
    panel-3:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: node_load1{job="node-exporter", instance="$instance", cluster=~"$cluster"}
                    legendFormat: 1m load average
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: node_load5{job="node-exporter", instance="$instance", cluster=~"$cluster"}
                    legendFormat: 5m load average
                  version: v0
                refId: B
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: node_load15{job="node-exporter", instance="$instance", cluster=~"$cluster"}
                    legendFormat: 15m load average
                  version: v0
                refId: C
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: count(node_cpu_seconds_total{job="node-exporter", instance="$instance", cluster=~"$cluster", mode="idle"})
                    legendFormat: logical cores
                  version: v0
                refId: D
            queryOptions: {}
            transformations: []
        description: ""
        id: 3
        links: []
        title: Load Average
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  showPoints: never
                min: 0
                unit: short
              overrides: []
            options:
              tooltip:
                mode: multi
          version: v11.4.0
    panel-5:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      (
                        node_memory_MemTotal_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster"}
                      -
                        node_memory_MemFree_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster"}
                      -
                        node_memory_Buffers_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster"}
                      -
                        node_memory_Cached_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster"}
                      )
                    legendFormat: memory used
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: node_memory_Buffers_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster"}
                    legendFormat: memory buffers
                  version: v0
                refId: B
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: node_memory_Cached_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster"}
                    legendFormat: memory cached
                  version: v0
                refId: C
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: node_memory_MemFree_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster"}
                    legendFormat: memory free
                  version: v0
                refId: D
            queryOptions: {}
            transformations: []
        description: ""
        id: 5
        links: []
        title: Memory Usage
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  stacking:
                    mode: normal
                min: 0
                unit: bytes
              overrides: []
            options:
              tooltip:
                mode: multi
          version: v11.4.0
    panel-6:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      100 -
                      (
                        avg(node_memory_MemAvailable_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster"}) /
                        avg(node_memory_MemTotal_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster"})
                      * 100
                      )
                  version: v0
                refId: A
            queryOptions: {}
            transformations: []
        description: ""
        id: 6
        links: []
        title: Memory Usage
        vizConfig:
          group: gauge
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                max: 100
                min: 0
                thresholds:
                  mode: ""
                  steps:
                  - color: rgba(50, 172, 45, 0.97)
                    value: null
                  - color: rgba(237, 129, 40, 0.89)
                    value: 80
                  - color: rgba(245, 54, 54, 0.9)
                    value: 90
                unit: percent
              overrides: []
            options: {}
          version: v11.4.0
    panel-8:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: rate(node_disk_read_bytes_total{job="node-exporter", instance="$instance", cluster=~"$cluster", device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[$__rate_interval])
                    intervalFactor: 1
                    legendFormat: "{{device}} read"
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: rate(node_disk_written_bytes_total{job="node-exporter", instance="$instance", cluster=~"$cluster", device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[$__rate_interval])
                    intervalFactor: 1
                    legendFormat: "{{device}} written"
                  version: v0
                refId: B
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: rate(node_disk_io_time_seconds_total{job="node-exporter", instance="$instance", cluster=~"$cluster", device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[$__rate_interval])
                    intervalFactor: 1
                    legendFormat: "{{device}} io time"
                  version: v0
                refId: C
            queryOptions: {}
            transformations: []
        description: ""
        id: 8
        links: []
        title: Disk I/O
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  showPoints: never
                min: 0
              overrides:
              - matcher:
                  id: byRegexp
                  options: / read| written/
                properties:
                - id: unit
                  value: Bps
              - matcher:
                  id: byRegexp
                  options: / io time/
                properties:
                - id: unit
                  value: percentunit
            options:
              tooltip:
                mode: multi
          version: v11.4.0
    panel-9:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      max by (mountpoint) (node_filesystem_size_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster", fstype!="", mountpoint!=""})
                    format: table
                    instant: true
                    legendFormat: ""
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: |
                      max by (mountpoint) (node_filesystem_avail_bytes{job="node-exporter", instance="$instance", cluster=~"$cluster", fstype!="", mountpoint!=""})
                    format: table
                    instant: true
                    legendFormat: ""
                  version: v0
                refId: B
            queryOptions: {}
            transformations:
            - group: groupBy
              kind: Transformation
              spec:
                options:
                  fields:
                    "Value #A":
                      aggregations:
                      - lastNotNull
                      operation: aggregate
                    "Value #B":
                      aggregations:
                      - lastNotNull
                      operation: aggregate
                    mountpoint:
                      aggregations: []
                      operation: groupby
            - group: merge
              kind: Transformation
              spec:
                options: null
            - group: calculateField
              kind: Transformation
              spec:
                options:
                  alias: Used
                  binary:
                    left: "Value #A (lastNotNull)"
                    operator: "-"
                    reducer: sum
                    right: "Value #B (lastNotNull)"
                  mode: binary
                  reduce:
                    reducer: sum
            - group: calculateField
              kind: Transformation
              spec:
                options:
                  alias: Used, %
                  binary:
                    left: Used
                    operator: /
                    reducer: sum
                    right: "Value #A (lastNotNull)"
                  mode: binary
                  reduce:
                    reducer: sum
            - group: organize
              kind: Transformation
              spec:
                options:
                  excludeByName: {}
                  indexByName: {}
                  renameByName:
                    "Value #A (lastNotNull)": Size
                    "Value #B (lastNotNull)": Available
                    mountpoint: Mounted on
            - group: sortBy
              kind: Transformation
              spec:
                options:
                  fields: {}
                  sort:
                  - field: Mounted on
        description: ""
        id: 9
        links: []
        title: Disk Space Usage
        vizConfig:
          group: table
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                thresholds:
                  mode: ""
                  steps:
                  - color: green
                    value: null
                  - color: yellow
                    value: 0.8
                  - color: red
                    value: 0.9
                unit: decbytes
              overrides:
              - matcher:
                  id: byName
                  options: Mounted on
                properties:
                - id: custom.width
                  value: 260
              - matcher:
                  id: byName
                  options: Size
                properties:
                - id: custom.width
                  value: 93
              - matcher:
                  id: byName
                  options: Used
                properties:
                - id: custom.width
                  value: 72
              - matcher:
                  id: byName
                  options: Available
                properties:
                - id: custom.width
                  value: 88
              - matcher:
                  id: byName
                  options: Used, %
                properties:
                - id: unit
                  value: percentunit
                - id: custom.cellOptions
                  value:
                    type: gauge
                - id: max
                  value: 1
                - id: min
                  value: 0
            options: {}
          version: v11.4.0
  layout:
    kind: RowsLayout
    spec:
      rows:
      - kind: RowsLayoutRow
        spec:
          collapse: false
          layout:
            kind: GridLayout
            spec:
              items:
              - kind: GridLayoutItem
                spec:
                  element:
                    kind: ElementReference
                    name: panel-2
                  height: 7
                  width: 12
                  x: 0
                  "y": 0
              - kind: GridLayoutItem
                spec:
                  element:
                    kind: ElementReference
                    name: panel-3
                  height: 7
                  width: 12
                  x: 12
                  "y": 0
          title: CPU
      - kind: RowsLayoutRow
        spec:
          collapse: false
          layout:
            kind: GridLayout
            spec:
              items:
              - kind: GridLayoutItem
                spec:
                  element:
                    kind: ElementReference
                    name: panel-5
                  height: 7
                  width: 18
                  x: 0
                  "y": 0
              - kind: GridLayoutItem
                spec:
                  element:
                    kind: ElementReference
                    name: panel-6
                  height: 7
                  width: 6
                  x: 18
                  "y": 0
          title: Memory
      - kind: RowsLayoutRow
        spec:
          collapse: false
          layout:
            kind: GridLayout
            spec:
              items:
              - kind: GridLayoutItem
                spec:
                  element:
                    kind: ElementReference
                    name: panel-8
                  height: 7
                  width: 12
                  x: 0
                  "y": 0
              - kind: GridLayoutItem
                spec:
                  element:
                    kind: ElementReference
                    name: panel-9
                  height: 7
                  width: 12
                  x: 12
                  "y": 0
          title: Disk
      - kind: RowsLayoutRow
        spec:
          collapse: false
          layout:
            kind: GridLayout
            spec:
              items:
              - kind: GridLayoutItem
                spec:
                  element:
                    kind: ElementReference
                    name: panel-11
                  height: 7
                  width: 12
                  x: 0
                  "y": 0
              - kind: GridLayoutItem
                spec:
                  element:
                    kind: ElementReference
                    name: panel-12
                  height: 7
                  width: 12
                  x: 12
                  "y": 0
          title: Network
  links: []
  liveNow: false
  preload: false
  tags:
  - node-exporter-mixin
  timeSettings:
    autoRefresh: 30s
    autoRefreshIntervals:
    - 5s
    - 10s
    - 30s
    - 1m
    - 5m
    - 15m
    - 30m
    - 1h
    - 2h
    - 1d
    fiscalYearStartMonth: 0
    from: now-1h
    hideTimepicker: false
    timezone: utc
    to: now
  title: Node Exporter / Nodes
  variables:
  - kind: DatasourceVariable
    spec:
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: dontHide
      includeAll: false
      multi: false
      name: datasource
      options: []
      pluginId: prometheus
      refresh: never
      regex: ""
      skipUrlSync: false
  - kind: QueryVariable
    spec:
      allValue: .*
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: hideVariable
      includeAll: true
      label: Cluster
      multi: false
      name: cluster
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(node_uname_info{job="node-exporter", sysname!="Darwin"}, cluster)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: disabled
  - kind: QueryVariable
    spec:
      allowCustomValue: true
      current:
        text: ""
        value: ""
      hide: dontHide
      includeAll: false
      label: Instance
      multi: false
      name: instance
      options: []
      query:
        datasource:
          name: ${datasource}
        group: prometheus
        kind: DataQuery
        spec:
          __legacyStringValue: label_values(node_uname_info{job="node-exporter", cluster=~"$cluster", sysname!="Darwin"}, instance)
        version: v0
      refresh: onTimeRangeChanged
      regex: ""
      skipUrlSync: false
      sort: disabled
