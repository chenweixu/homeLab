apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: k8s-apiserver
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: "Off"
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries: []
            queryOptions: {}
            transformations: []
        description: The SLO (service level objective) and other metrics displayed on this dashboard are for informational purposes only.
        id: 1
        links: []
        title: Notice
        vizConfig:
          group: text
          kind: VizConfig
          spec:
            fieldConfig:
              defaults: {}
              overrides: []
            options:
              code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
              content: The SLO (service level objective) and other metrics displayed on this dashboard are for informational purposes only.
              mode: markdown
          version: 13.1.0-24866141508
    panel-10:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum by (resource) (code_resource:apiserver_request_total:rate5m{verb="write",code=~"5..", cluster="$cluster"}) / sum by (resource) (code_resource:apiserver_request_total:rate5m{verb="write", cluster="$cluster"})
                    legendFormat: "{{ resource }}"
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: How many percent of write requests (POST|PUT|PATCH|DELETE) per second are returned with errors (5xx)?
        id: 10
        links: []
        title: "Write SLI - Errors"
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 0
                  gradientMode: none
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: linear
                  lineWidth: 1
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: auto
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
                min: 0
                thresholds:
                  mode: absolute
                  steps:
                  - color: green
                    value: 0
                  - color: red
                    value: 80
                unit: percentunit
              overrides: []
            options:
              annotations:
                clustering: -1
                multiLane: false
              legend:
                asTable: true
                calcs: []
                displayMode: list
                placement: right
                showLegend: true
              tooltip:
                hideZeros: false
                mode: single
                sort: none
          version: 13.1.0-24866141508
