apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  labels: {}
  name: Kubernetes-Compute-Resources-Node-Pods
  namespace: default
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      legacyOptions:
        type: dashboard
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
  cursorSync: "Off"
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(kube_node_status_capacity{cluster="$cluster", job="kube-state-metrics", node=~"$node", resource="cpu"})
                    legendFormat: max capacity
                  version: v0
                refId: A
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(kube_node_status_allocatable{cluster="$cluster", job="kube-state-metrics", node=~"$node", resource="cpu"})
                    legendFormat: max allocatable
                  version: v0
                refId: B
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(max by (cluster, namespace, pod, container)(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_rate5m{cluster="$cluster", node=~"$node"})) by (pod)
                    legendFormat: "{{pod}}"
                  version: v0
                refId: C
            queryOptions:
              interval: 1m
            transformations: []
        description: ""
        id: 1
        links: []
        title: CPU Usage
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 10
                  showPoints: never
                  spanNulls: true
                  stacking:
                    mode: normal
              overrides:
              - matcher:
                  id: byName
                  options: max capacity
                properties:
                - id: color
                  value:
                    fixedColor: red
                    mode: fixed
                - id: custom.stacking
                  value:
                    mode: none
                - id: custom.hideFrom
                  value:
                    legend: false
                    tooltip: true
                    viz: false
                - id: custom.lineStyle
                  value:
                    dash:
                    - 10
                    - 10
                    fill: dash
              - matcher:
                  id: byName
                  options: max allocatable
                properties:
                - id: color
                  value:
                    fixedColor: super-light-red
                    mode: fixed
                - id: custom.stacking
                  value:
                    mode: none
                - id: custom.hideFrom
                  value:
                    legend: false
                    tooltip: true
                    viz: false
                - id: custom.lineStyle
                  value:
                    dash:
                    - 10
                    - 10
                    fill: dash
                - id: custom.fillOpacity
                  value: 0
            options:
              legend:
                asTable: true
                calcs:
                - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                mode: single
          version: v11.4.0
