                  version: v0
                refId: E
            queryOptions: {}
            transformations:
            - group: joinByField
              kind: Transformation
              spec:
                options:
                  byField: pod
                  mode: outer
            - group: organize
              kind: Transformation
              spec:
                options:
                  excludeByName:
                    Time: true
                    Time 1: true
                    Time 2: true
                    Time 3: true
                    Time 4: true
                    Time 5: true
                  renameByName:
                    "Value #A": CPU Usage
                    "Value #B": CPU Requests
                    "Value #C": CPU Requests %
                    "Value #D": CPU Limits
                    "Value #E": CPU Limits %
                    pod: Pod
        description: ""
        id: 2
        links: []
        title: CPU Quota
        vizConfig:
          group: table
          kind: VizConfig
          spec:
            fieldConfig:
