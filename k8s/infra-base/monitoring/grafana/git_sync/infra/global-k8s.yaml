apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
  name: global-k8s
spec:
  title: global-k8s
  cursorSync: "Off"
  description: ""
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(kubelet_node_name{cluster="$cluster", job="kubelet", metrics_path="/metrics"})
                    instant: true
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: "节点数量"
        id: 1
        links: []
        title: Running Kubelets
        vizConfig:
          group: stat
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                unit: none
              overrides: []
            options:
              colorMode: none
          version: v11.4.0
    panel-2:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(kubelet_running_pods{cluster="$cluster", job="kubelet", metrics_path="/metrics", instance=~"$instance"})
                    instant: true
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: "pod数量"
        id: 2
        links: []
        title: Running Pods
        vizConfig:
          group: stat
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                unit: none
              overrides: []
            options:
              colorMode: none
          version: v11.4.0
    panel-3:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: ${datasource}
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sum(kubelet_running_containers{cluster="$cluster", job="kubelet", metrics_path="/metrics", instance=~"$instance"})
                    instant: true
                  version: v0
                refId: A
            queryOptions:
              interval: 1m
            transformations: []
        description: "运行中pod数量"
        id: 3
        links: []
        title: Running Containers
        vizConfig:
          group: stat
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                unit: none
              overrides: []
            options:
              colorMode: none
          version: v11.4.0
  layout:
    kind: GridLayout
    spec:
      items:
        - kind: GridLayoutItem
          spec:
            element:
              kind: ElementReference
              name: panel-1
            height: 5
            width: 5
            x: 0
            "y": 0
        - kind: GridLayoutItem
          spec:
            element:
              kind: ElementReference
              name: panel-2
            height: 5
            width: 5
            x: 0
            "y": 0
        - kind: GridLayoutItem
          spec:
            element:
              kind: ElementReference
              name: panel-3
            height: 5
            width: 5
            x: 0
            "y": 0
  links: []
  liveNow: false
  preferences:
    layout:
      kind: GridLayout
      spec:
        items: []
  preload: false
  tags: []

  # 时间设定
  timeSettings:
    autoRefresh: ""             # 不自动刷新
    fiscalYearStartMonth: 0
    from: now-2h                # 默认显示的开始时间
    to: now                     # 默认显示的结束时间
    hideTimepicker: false
    timezone: browser           # 使用浏览器时区
    autoRefreshIntervals:       # 可选自动刷新间隔
      - 5s
      - 10s
      - 30s
      - 1m
      - 5m
      - 15m
      - 30m
      - 1h
      - 2h
      - 1d

  # 变量定义
  variables:
  - kind: DatasourceVariable
    spec:
      allowCustomValue: true
      current:
        text: default
        value: default
      hide: dontHide
      includeAll: false
      label: Data source
      multi: false
      name: datasource
      options: []
      pluginId: prometheus
      refresh: never
      regex: ""
      skipUrlSync: false
