apiVersion: dashboard.grafana.app/v2
kind: Dashboard
metadata:
    name: global-k8s
spec:
    annotations:
        - kind: AnnotationQuery
          spec:
            builtIn: true
            enable: true
            hide: true
            iconColor: rgba(0, 211, 255, 1)
            name: Annotations & Alerts
            query:
                datasource:
                    name: -- Grafana --
                group: grafana
                kind: DataQuery
                spec: {}
                version: v0
    cursorSync: "Off"
    description: ""
    editable: true
    elements:
        panel-1:
            kind: Panel
            spec:
                data:
                    kind: QueryGroup
                    spec:
                        queries:
                            - kind: PanelQuery
                              spec:
                                hidden: false
                                query:
                                    datasource:
                                        name: ${datasource}
                                    group: prometheus
                                    kind: DataQuery
                                    spec:
                                        editorMode: code
                                        expr: sum(kubelet_node_name{job="kubelet", metrics_path="/metrics",service="kubelet"})
                                        instant: true
                                    version: v0
                                refId: A
                        queryOptions:
                            interval: 1m
                        transformations: []
                description: 节点数量
                id: 1
                links: []
                title: Total-Node
                vizConfig:
                    group: stat
                    kind: VizConfig
                    spec:
                        fieldConfig:
                            defaults:
                                thresholds:
                                    mode: absolute
                                    steps:
                                        - color: green
                                          value: 0
                                        - color: red
                                          value: 80
                                unit: none
                            overrides: []
                        options:
                            colorMode: none
                            graphMode: area
                            justifyMode: auto
                            orientation: auto
                            percentChangeColorMode: standard
                            reduceOptions:
                                calcs:
                                    - lastNotNull
                                fields: ""
                                values: false
                            showPercentChange: false
                            textMode: auto
                            wideLayout: true
                    version: 13.1.0-24866141508
        panel-2:
            kind: Panel
            spec:
                data:
                    kind: QueryGroup
                    spec:
                        queries:
                            - kind: PanelQuery
                              spec:
                                hidden: false
                                query:
                                    datasource:
                                        name: ${datasource}
                                    group: prometheus
                                    kind: DataQuery
                                    spec:
                                        editorMode: code
                                        expr: sum(kubelet_running_pods{job="kubelet", metrics_path="/metrics"})
                                        instant: true
                                    version: v0
                                refId: A
                        queryOptions:
                            interval: 1m
                        transformations: []
                description: pod数量
                id: 2
                links: []
                title: Total-Pod
                vizConfig:
                    group: stat
                    kind: VizConfig
                    spec:
                        fieldConfig:
                            defaults:
                                thresholds:
                                    mode: absolute
                                    steps:
                                        - color: green
                                          value: 0
                                        - color: red
                                          value: 80
                                unit: none
                            overrides: []
                        options:
                            colorMode: none
                            graphMode: area
                            justifyMode: auto
                            orientation: auto
                            percentChangeColorMode: standard
                            reduceOptions:
                                calcs:
                                    - lastNotNull
                                fields: ""
                                values: false
                            showPercentChange: false
                            textMode: auto
                            wideLayout: true
                    version: 13.1.0-24866141508
        panel-3:
            kind: Panel
            spec:
                data:
                    kind: QueryGroup
                    spec:
                        queries:
                            - kind: PanelQuery
                              spec:
                                hidden: false
                                query:
                                    datasource:
                                        name: ${datasource}
                                    group: prometheus
                                    kind: DataQuery
                                    spec:
                                        editorMode: code
                                        expr: sum(kubelet_running_containers{job="kubelet", metrics_path="/metrics"})
                                        instant: true
                                    version: v0
                                refId: A
                        queryOptions:
                            interval: 1m
                        transformations: []
                description: 运行中pod数量
                id: 3
                links: []
                title: Total-Containers
                vizConfig:
                    group: stat
                    kind: VizConfig
                    spec:
                        fieldConfig:
                            defaults:
                                thresholds:
                                    mode: absolute
                                    steps:
                                        - color: green
                                          value: 0
                                        - color: red
                                          value: 80
                                unit: none
                            overrides: []
                        options:
                            colorMode: none
                            graphMode: area
                            justifyMode: auto
                            orientation: auto
                            percentChangeColorMode: standard
                            reduceOptions:
                                calcs:
                                    - lastNotNull
                                fields: ""
                                values: false
                            showPercentChange: false
                            textMode: auto
                            wideLayout: true
                    version: 13.1.0-24866141508
    layout:
        kind: GridLayout
        spec:
            items:
                - kind: GridLayoutItem
                  spec:
                    element:
                        kind: ElementReference
                        name: panel-1
                    height: 4
                    width: 5
                    x: 0
                    "y": 0
                - kind: GridLayoutItem
                  spec:
                    element:
                        kind: ElementReference
                        name: panel-2
                    height: 4
                    width: 5
                    x: 5
                    "y": 0
                - kind: GridLayoutItem
                  spec:
                    element:
                        kind: ElementReference
                        name: panel-3
                    height: 4
                    width: 5
                    x: 10
                    "y": 0
    links: []
    liveNow: false
    preferences:
        layout:
            kind: GridLayout
            spec:
                items: []
    preload: false
    tags: []
    timeSettings:
        autoRefresh: ""
        autoRefreshIntervals:
            - 5s
            - 10s
            - 30s
            - 1m
            - 5m
            - 15m
            - 30m
            - 1h
            - 2h
            - 1d
        fiscalYearStartMonth: 0
        from: now-2h
        hideTimepicker: false
        timezone: browser
        to: now
    title: global-k8s
    variables:
        - kind: DatasourceVariable
          spec:
            allowCustomValue: true
            current:
                text: 默认
                value: default
            hide: dontHide
            includeAll: false
            label: Data source
            multi: false
            name: datasource
            options: []
            pluginId: prometheus
            refresh: onDashboardLoad
            regex: ""
            skipUrlSync: false
