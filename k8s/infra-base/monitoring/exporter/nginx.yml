apiVersion: v1
kind: Service
metadata:
  name: nginx-exporter
  namespace: monitoring
spec:
  selector:
    app: nginx-exporter
  ports:
  - port: 80
    targetPort: 9113
    protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-exporter
  template:
    metadata:
      labels:
        app: nginx-exporter
    spec:
      containers:
      - name: nginx-exporter
        image: harbor.chenwx.top/ghcr.io/nginx/nginx-prometheus-exporter:1.5.1
        ports:
        - name: http
          containerPort: 9113
          protocol: TCP
        args:
          - "--nginx.scrape-uri=http://files.services.wait/stub_status"
        resources: {}
