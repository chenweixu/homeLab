apiVersion: v1
kind: Service
metadata:
  name: mysql-exporter
  namespace: monitoring
spec:
  selector:
    app: mysql-exporter
  ports:
  - port: 80
    targetPort: 9104
    protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-exporter
  template:
    metadata:
      labels:
        app: mysql-exporter
    spec:
      containers:
      - name: mysql-exporter
        image: harbor.chenwx.top/quay.io/prometheus/mysqld-exporter:v0.17.2
        ports:
        - name: http
          containerPort: 9104
          protocol: TCP
        # readinessProbe:
        #   httpGet:
        #     port: 9104
        #     path: /health
        #   initialDelaySeconds: 30
        #   periodSeconds: 10
        #   timeoutSeconds: 30
        #   failureThreshold: 10
        # livenessProbe:
        #   httpGet:
        #     port: 9104
        #     path: /health
        #   initialDelaySeconds: 30
        #   periodSeconds: 10
        #   timeoutSeconds: 3
        #   failureThreshold: 1

        resources:
          limits:
            cpu: 300m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi

        volumeMounts:
        - name: config
          mountPath: "/.my.cnf"
          subPath: "mysql.cnf"
          readOnly: true

      volumes:
      - name: config
        secret:
          secretName: exporter-secret
          items:
          - key: mysql.cnf
            path: mysql.cnf
