apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: monitoring
spec:
  selector:
    app: redis-exporter
  ports:
  - port: 80
    targetPort: 9121
    protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
      - name: redis-exporter
        image: harbor.chenwx.top/quay.io/oliver006/redis_exporter:v1.83.0
        ports:
        - name: http
          containerPort: 9121
          protocol: TCP
        resources: {}
