apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-exporter
  namespace: monitoring
spec:
  selector:
    app: elasticsearch-exporter
  ports:
  - port: 80
    targetPort: 9114
    protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch-exporter
  template:
    metadata:
      labels:
        app: elasticsearch-exporter
    spec:
      imagePullSecrets:
        - name: harbor-registry-chenwx-secret
      containers:
      - name: elasticsearch-exporter
        image: harbor.chenwx.top/chenwx/prometheuscommunity/elasticsearch-exporter:v1.10.0
        ports:
        - name: http
          containerPort: 9114
          protocol: TCP
        resources: {}
