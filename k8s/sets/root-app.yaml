apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/resources-finalizer

spec:
  project: localhome-2
  source:
    path: k8s/apps
    repoURL: ssh://git@git.chenwx.top:10022/chenwx/homeLab.git
    targetRevision: HEAD
  destination:
    namespace: argocd
    name: in-cluster
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
