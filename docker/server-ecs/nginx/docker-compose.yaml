services:
  nginx:
    restart: always
    image: chenwx/nginx:1.29.8
    network_mode: "host"
    command:
      ["nginx", "-g", "daemon off;"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/logs
      - /home/wait/data/web:/web:ro
      - ./cert/:/cert/
    environment:
      NGINX_ENTRYPOINT_QUIET_LOGS: off
    # extra_hosts:
    #   - "jaeger-grpc.chenwx.top:192.168.5.30"
