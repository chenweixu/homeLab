# load_module modules/ngx_http_acme_module.so;
load_module modules/ngx_otel_module.so;

worker_processes  1;

error_log /logs/error.log;
#pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    otel_exporter {
        endpoint    192.168.5.8:4317;

        interval    5s;
        batch_size  512;
        batch_count 4;
    }

    otel_service_name "ecs-nginx";
    otel_resource_attr "deployment.environment" "pro";
    otel_resource_attr "nginx.version" "1.29.8";
    otel_trace on;
    otel_trace_context propagate;

    log_format  main 'ecs:$hostname:$server_port:$msec:$connection:$connection_requests '
            '$request_id '
            '[$time_iso8601] $status $request_time $bytes_sent $body_bytes_sent '
            '"$remote_addr" "$http_x_forwarded_for" '
            '"$upstream_addr" "$upstream_status" "$upstream_response_time" '
            '$request_length "$content_length" "$host" "$http_host" '
            '"$server_protocol" "$request_method" "$request_uri" "$http_referer" '
            '"$http_content_type" "$http_user_agent" "$request_body"';

    access_log  /logs/access.log  main;

    proxy_cache_path /tmp/cache levels=1:2 keys_zone=site_cache:5m max_size=100m inactive=7d use_temp_path=off;

    sendfile        on;
    #tcp_nopush     on;
    keepalive_timeout  65;

    resolver 8.8.8.8 1.1.1.1;


    server {
        listen 80 default_server;
        server_name _;
        location / {
            return 301 https://$host$request_uri;
        }
    }

    #===================================================================
    server {

        listen 443 quic reuseport;
        listen [::]:443 quic reuseport;
        http3 on;

        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        server_name chenwx.top www.chenwx.top blog.chenwx.top m.chenwx.top;

        # proxy_cache site_cache;
        # proxy_cache_valid    200 301 302 3d;
        # proxy_cache_valid    any 10m;

        gzip on;
        gzip_min_length   20k;
        gzip_comp_level   2;
        gzip_buffers      16 32k;
        gzip_types text/plain text/css text/javascript application/javascript;

        ssl_certificate     /cert/chenwx.top.crt;
        ssl_certificate_key /cert/chenwx.top.key;

        # ssl 会话缓存
        ssl_certificate_cache max=2;

        ssl_protocols TLSv1.3;
        ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;

        # 告知客户端支持 HTTP/3
        add_header Alt-Svc 'h3=":443"; ma=86400';

        # 优先服务器端加密算法
        ssl_prefer_server_ciphers on;

        # sts
        add_header Strict-Transport-Security "max-age=63072000" always;

        # 拦截非 get-post 请求
        if ($request_method !~ ^(GET|POST|HEAD)$ ) {
            return 404;
        }

        # 拦截非 主站 请求
        if ( $host !~ ^(chenwx.top|www.chenwx.top|blog.chenwx.top|m.chenwx.top|docs.chenwx.top)$ ){
            return 404;
        }

        error_page 404 /404.html;

        location = /health {
            access_log off;
            return 200 "ok";
        }

        #===================================================================

        location / {
            root /web/blog;
            index index.html;
        }

        location ^~ /tools/ {
            root /web;
            index index.html;

            try_files $uri @route;
        }

        location @route {
            rewrite ^.*$ /tools/index.html last;
        }

        location ^~ /files/ {
            root /web;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        location = /files/ {
            root /web;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            sub_filter '<a href="../">../</a>' '';
        }

        # location / {
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header Host $http_host;
        #     proxy_set_header X-NginX-Proxy true;
        #     proxy_read_timeout 5s;
        #     # proxy_pass http://192.168.5.30;
        #     proxy_pass http://192.168.5.9;
        # }

    }

    #===================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        server_name docs.chenwx.top;

        otel_span_attr "server.type" "ecs-nginx-doc";

        gzip on;
        gzip_min_length   20k;
        gzip_comp_level   2;
        gzip_buffers      16 32k;
        gzip_types text/plain text/css text/javascript application/javascript;

        ssl_certificate     /cert/chenwx.top.crt;
        ssl_certificate_key /cert/chenwx.top.key;

        # ssl 会话缓存
        ssl_certificate_cache max=2;

        ssl_protocols TLSv1.3;
        ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;

        # 优先服务器端加密算法
        ssl_prefer_server_ciphers on;
        # 告知客户端支持 HTTP/3
        #add_header Alt-Svc 'h3=":443"; ma=600';
        # sts
        add_header Strict-Transport-Security "max-age=63072000" always;

        # 拦截非 get-post 请求
        if ($request_method !~ ^(GET|POST|HEAD)$ ) {
            return 404;
        }


        location / {
            root /web/docs/;
            index index.html;
        }

        error_page 404 /404.html;
    }


}
