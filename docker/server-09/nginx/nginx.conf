load_module modules/ngx_otel_module.so;

worker_processes  1;

# error_log  /dev/stderr warn;
error_log /logs/error.log;

#pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    server_names_hash_bucket_size 64;

    otel_exporter {
        # endpoint    https://jaeger-grpc.chenwx.top;
        endpoint    192.168.5.30:4317;
        # endpoint    192.168.5.9:4317;

        interval    5s;
        batch_size  512;
        batch_count 4;
    }

    otel_service_name "nginx-09";
    otel_resource_attr "deployment.environment" "dev";
    otel_resource_attr "nginx.version" "1.29.8";
    otel_trace on;
    otel_trace_context propagate;

    log_format  main 'pve-1:$hostname:$server_port:$msec:$connection:$connection_requests '
            '$request_id '
            '[$time_iso8601] $status $request_time $bytes_sent $body_bytes_sent '
            '"$remote_addr" "$http_x_forwarded_for" '
            '"$upstream_addr" "$upstream_status" "$upstream_response_time" '
            '$request_length "$content_length" "$host" "$http_host" '
            '"$server_protocol" "$request_method" "$request_uri" "$http_referer" '
            '"$http_content_type" "$http_user_agent" "$request_body"';

    access_log  /logs/access.log  main;
    # access_log  /dev/stdout  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;
    client_max_body_size 20m;

    # include vhost/*.conf;

    server  {
        listen 80;
        server_name localhost;
        proxy_connect_timeout 2;

        location / {
            root   /files;
            autoindex on;
            autoindex_localtime on;
            autoindex_exact_size off;
        }

        location = /stub_status {
            stub_status;
            access_log off;
        }

    }

}
