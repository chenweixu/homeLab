volumes:
  pg_db:
    name: pg_db_18_pgvector
    external: true

networks:
  core:
    name: core
    external: true

services:
  pgvector:
    container_name: pgvector
    image: harbor.chenwx.top/docker.io/pgvector/pgvector:0.8.2-pg18-trixie
    restart: unless-stopped
    networks:
      - core
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: dba
      POSTGRES_DB: dba
    ports:
      - 15432:5432/tcp
    volumes:
      - pg_db:/var/lib/postgresql
      - /home/wait/tmp:/tmpdata
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
