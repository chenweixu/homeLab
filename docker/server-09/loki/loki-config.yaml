# loki 配置
auth_enabled: false

server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3100
  log_level: info
  grpc_server_max_concurrent_streams: 1000


common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  replication_factor: 1
  compactor_address: http://backend:3100
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules

    # s3:
    #   endpoint: http://minio.chenwx.top
    #   insecure: true
    #   bucketnames: loki
    #   access_key_id: fbfjzbimG6YTRGlBuHDS
    #   secret_access_key: 72JPfBWI6J3OuzDbSLVGm8YrBmVlQapzDRDGx3Gh
    #   s3forcepathstyle: true
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

limits_config:
  # 允许通过 API 删除日志
  deletion_mode: "filter-and-delete"
  metric_aggregation_enabled: true
  enable_multi_variant_queries: true
  allow_structured_metadata: true

schema_config:
  configs:
    - from: 2025-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

  # configs:
  #   - from: 2023-01-01
  #     store: tsdb
  #     object_store: s3
  #     schema: v13
  #     index:
  #       prefix: index_
  #       period: 24h

pattern_ingester:
  enabled: true
  metric_aggregation:
    loki_address: localhost:3100

ruler:
  alertmanager_url: http://localhost:9093

frontend:
  encoding: protobuf


# ruler:
#   storage:
#     s3:
#       bucketnames: loki-ruler

compactor:
  working_directory: /tmp/compactor
  retention_enabled: true       # 必须开启 compactor 才能删除
  retention_delete_delay: 10s   # 删除请求确认后的等待时间
  delete_request_store: filesystem

