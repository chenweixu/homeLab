
tls:
  certificates:
    # - certFile: /ssl/services.wait.pem
    #   keyFile: /ssl/services.wait-key.pem
    - certFile: /ssl/chenwx.top.crt
      keyFile: /ssl/chenwx.top.key


# http to https
# 这部分内容是动态的, 所以需要文件
# 而且必须要路由到一个服务上去
http:
  services:
    noop:
      LoadBalancer:
        servers:
          url = "" # or url = "localhost"

  routers:
    dashboard:
      tls: true
      entrypoints: https
      rule: Host(`traefix-09.chenwx.top`)
      service: dashboard@internal
      middlewares:
        - auth@file
        - dashboard_redirect@internal
        - dashboard_stripprefix@internal

    traefik-dash-api:
      tls: true
      entrypoints: https
      rule: Host(`traefix-09.chenwx.top`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
      service: api@internal

  middlewares:
    redirectHttps:
      redirectscheme:
        scheme: https
        permanent: true

    auth:
      basicauth:
        usersFile: /etc/traefik/secrets/basic_auth_users
        removeheader: true
