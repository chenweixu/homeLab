volumes:
  pg_db:
    name: pg_db_18
    external: true

networks:
  core:
    name: core
    external: true

services:
  postgres:
    container_name: postgres
    image: harbor.chenwx.top/chenwx/postgres-cwx:18.4
    # image: harbor.chenwx.top/docker.io/postgres:18.4
    restart: unless-stopped
    networks:
      - core
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: dba
      POSTGRES_DB: dba
    ports:
      - 5432:5432/tcp
    volumes:
      - pg_db:/var/lib/postgresql
      - /home/wait/tmp:/tmpdata
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements, pg_cron, vector, pg_stat_plans"
