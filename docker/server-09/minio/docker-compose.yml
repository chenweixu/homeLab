networks:
  core:
    external: true
    name: core

services:
  minio:
    container_name: minio
    image: harbor.chenwx.top/docker.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    networks:
      - core
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"
    volumes:
      - "/data/volumes/minio:/data"
    command: server --console-address ":9001" /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "service_name=minio"
      - "traefik.enable=true"
      - "traefik.http.routers.minioHttpsConsole.entrypoints=https"
      - "traefik.http.routers.minioHttpsConsole.service=minioWebConsole"
      - "traefik.http.routers.minioHttpsConsole.rule=Host(`minioWebConsole.chenwx.top`)"
      - "traefik.http.routers.minioHttpsConsole.tls=true"
      - "traefik.http.services.minioWebConsole.loadbalancer.server.port=9001"

      - "traefik.http.routers.minioHttps.entrypoints=https"
      - "traefik.http.routers.minioHttps.service=minioHttps"
      - "traefik.http.routers.minioHttps.rule=Host(`minio.chenwx.top`)"
      - "traefik.http.routers.minioHttps.tls=true"
      - "traefik.http.services.minioHttps.loadbalancer.server.port=9000"


    logging:
      options:
        labels: "service_name"
