name: terraform-proxmox

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/proxmox/**'
      - 'terraform/modules/proxmox_vm/**'
  workflow_dispatch:

env:
  TF_VERSION: '1.13.4'

jobs:
  terraform-plan:
    runs-on: host
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # 使用 Terraform 原生 plugin cache，比 actions/cache 更可靠
      - name: Setup Terraform Plugin Cache
        run: |
          mkdir -p $HOME/.terraform.d/plugin-cache
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> $GITHUB_ENV

      - name: Import Secrets
        id: import-secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://vault.chenwx.top
          method: approle
          roleId: ${{ secrets.VAULT_APPROLE_ROLE_ID }}
          secretId: ${{ secrets.VAULT_APPROLE_SECRET_ID }}
          secrets: |
            homelab/data/infra/kubernetes/config config | KUBE_CONFIG

      - name: Write kubeconfig to temp file
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" > ~/.kube/config
        env:
          KUBE_CONFIG: ${{ steps.import-secrets.outputs.KUBE_CONFIG }}

      - name: Set AWS credentials for Terraform Backend
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.MINIO_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.MINIO_SECRET_KEY }}" >> $GITHUB_ENV

      # host runner 访问公网 registry 需要代理
      - name: Setup Network Proxy
        run: |
          echo "https_proxy=http://192.168.5.4:15732" >> $GITHUB_ENV
          echo "http_proxy=http://192.168.5.4:15732" >> $GITHUB_ENV
          echo "NO_PROXY=localhost,127.0.0.1,192.168.0.0/16,.chenwx.top" >> $GITHUB_ENV

      - name: Terraform Init
        run: |
          cd terraform/proxmox
          terraform init

      - name: Terraform fmt check
        run: |
          cd terraform/proxmox
          echo "--> terraform fmt -check -recursive -diff"
          terraform fmt -check -recursive -diff || true

      - name: Terraform Plan
        timeout-minutes: 2
        env:
          TF_VAR_vault_role_id: ${{ secrets.VAULT_APPROLE_ROLE_ID }}
          TF_VAR_vault_secret_id: ${{ secrets.VAULT_APPROLE_SECRET_ID }}
        run: |
          cd terraform/proxmox
          echo "--> terraform plan -out=tfplan"
          terraform plan -input=false -out=tfplan

          echo "--> terraform show tfplan (human-readable)"
          terraform show tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v3
        with:
          name: tfplan-proxmox
          path: terraform/proxmox/tfplan
          retention-days: 7

  terraform-apply:
    needs: terraform-plan
    runs-on: host
    timeout-minutes: 15
    # 在 Gitea 仓库 Settings > Environments 中创建 "proxmox-apply" 环境并开启审批
    environment: proxmox-apply
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terraform Plugin Cache
        run: |
          mkdir -p $HOME/.terraform.d/plugin-cache
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> $GITHUB_ENV

      - name: Import Secrets
        id: import-secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://vault.chenwx.top
          method: approle
          roleId: ${{ secrets.VAULT_APPROLE_ROLE_ID }}
          secretId: ${{ secrets.VAULT_APPROLE_SECRET_ID }}
          secrets: |
            homelab/data/infra/kubernetes/config config | KUBE_CONFIG

      - name: Write kubeconfig to temp file
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" > ~/.kube/config
        env:
          KUBE_CONFIG: ${{ steps.import-secrets.outputs.KUBE_CONFIG }}

      - name: Set AWS credentials for Terraform Backend
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.MINIO_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.MINIO_SECRET_KEY }}" >> $GITHUB_ENV

      - name: Setup Network Proxy
        run: |
          echo "https_proxy=http://192.168.5.4:15732" >> $GITHUB_ENV
          echo "http_proxy=http://192.168.5.4:15732" >> $GITHUB_ENV
          echo "NO_PROXY=localhost,127.0.0.1,192.168.0.0/16,.chenwx.top" >> $GITHUB_ENV

      - name: Terraform Init
        run: |
          cd terraform/proxmox
          terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v3
        with:
          name: tfplan-proxmox
          path: terraform/proxmox/

      - name: Terraform Apply
        env:
          TF_VAR_vault_role_id: ${{ secrets.VAULT_APPROLE_ROLE_ID }}
          TF_VAR_vault_secret_id: ${{ secrets.VAULT_APPROLE_SECRET_ID }}
        run: |
          cd terraform/proxmox
          echo "--> terraform apply tfplan"
          terraform apply tfplan
